name: Deploy to AWS CodeDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Zip application
        run: zip -r deploy.zip . -x "*.git*"

      - name: Upload bundle to S3
        run: |
          aws s3 cp deploy.zip s3://marialy-codedeploy-bucket/deploy.zip

      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name CodeDeploy-Lab-Marialy \
            --deployment-group-name Lab-Stage-Marialy \
            --s3-location bucket=marialy-codedeploy-bucket,bundleType=zip,key=deploy.zip